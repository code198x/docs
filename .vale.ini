# Vale — shared house prose style (House198x), pulled from a versioned package
# so every repo lints against the same rules. Source:
# https://github.com/stevehill1981/house-style
#
# Setup (once, and after a style release):  mkdir -p .vale && vale sync
# Everything is a *suggestion*, not a gate — it catches the avoidable kind of
# writing difficulty, not the legitimate difficulty of the subject matter.

StylesPath = .vale
Packages = https://github.com/stevehill1981/house-style/releases/latest/download/House198x.zip
MinAlertLevel = suggestion

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = House198x
# Passive voice is the noisiest rule and often correct in technical prose; off by default.
House198x.Passive = NO
